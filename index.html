};const userAvatar = (uid) => {

function App() {
  const [currentUser, setCurrentUser] = useState(() => {
    try { return localStorage.getItem("organica_user") || ""; } catch { return ""; }
  });
  const [completed, setCompleted] = useState({});
  const [sharedState, setSharedState] = useState({});
  const [metrics, setMetrics] = useState({});
  const [activeTab, setActiveTab] = useState("checklist");
  const [filter, setFilter] = useState("all");
  const [expandedTask, setExpandedTask] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [lastSync, setLastSync] = useState(null);
  const syncTimer = useRef(null);

  const fetchData = useCallback(async () => {
    try {
      setSyncing(true);
      const r = await fetch(API_URL);
      const d = await r.json();
      if (d.ok) {
        if (d.checklist) setSharedState(d.checklist);
        if (d.metrics) {
          const m = {};
          Object.entries(d.metrics).forEach(([k,v]) => { m[k] = v.value; });
          setMetrics(m);        }
        // rebuild my completed map from shared state
        if (d.checklist && currentUser) {
          const myCompleted = {};
          Object.entries(d.checklist).forEach(([tid, users]) => {
            // task is "done" if ANY user marked it
            const anyDone = Object.values(users).some(u => u.completed);
            if (anyDone) myCompleted[tid] = true;
          });
          setCompleted(myCompleted);
        }
        setLastSync(new Date());
      }
    } catch (e) { console.error("Sync error:", e); }
    finally { setSyncing(false); }
  }, [currentUser]);

  useEffect(() => {
    if (currentUser) {
      localStorage.setItem("organica_user", currentUser);
      fetchData();
      syncTimer.current = setInterval(fetchData, 30000);
      return () => clearInterval(syncTimer.current);
    }
  }, [currentUser, fetchData]);

  const toggle = async (id) => {
    if (!currentUser) return alert("Selecione seu nome primeiro!");
    const newVal = !completed[id];
    setCompleted(p => ({ ...p, [id]: newVal }));    try {
      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "toggleTask", taskId: id, userId: currentUser, completed: newVal })
      });
      setTimeout(fetchData, 500);
    } catch (e) { console.error("Toggle error:", e); }
  };

  const updateMetric = async (key, value) => {
    const v = parseFloat(value) || 0;
    setMetrics(p => ({ ...p, [key]: v }));
    try {
      await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "updateMetric", key, value: v, source: "manual" })
      });
    } catch (e) { console.error("Metric error:", e); }
  };

  const totalTasks = TASKS.length;
  const doneTasks = Object.values(completed).filter(Boolean).length;
  const pct = Math.round((doneTasks / totalTasks) * 100);

  const filtered = filter === "all" ? TASKS :
    filter === "pending" ? TASKS.filter(t => !completed[t.id]) :
    filter === "done" ? TASKS.filter(t => completed[t.id]) :
    filter === "yuri" ? TASKS.filter(t => t.owner.includes("Yuri")) :    filter === "joao" ? TASKS.filter(t => t.owner.includes("Joao")) :
    filter === "kaique" ? TASKS.filter(t => t.owner.includes("Kaique")) :
    filter === "octavio" ? TASKS.filter(t => t.owner.includes("Octavio")) :
    TASKS.filter(t => t.priority === filter);

  const getStatus = (key) => {
    const val = metrics[key]; if (val === undefined || val === 0) return "pending";
    const m = METRICS_BASELINE[key];
    if (m.inverse) return val <= m.target ? "positive" : "negative";
    return val >= m.target ? "positive" : val >= m.baseline ? "neutral" : "negative";
  };
  const goNoGo = () => {
    const keys = Object.keys(METRICS_BASELINE).filter(k => !METRICS_BASELINE[k].alert);
    let pos = 0; keys.forEach(k => { if (getStatus(k) === "positive") pos++; });
    return { pos, total: keys.length };
  };

  const whoCompleted = (taskId) => {
    const s = sharedState[String(taskId)];
    if (!s) return [];
    return Object.entries(s).filter(([,v]) => v.completed).map(([uid]) => uid);
  };

  // USER PICKER
  if (!currentUser) {

                <div className="avatar" style={{background: u.color}}>{u.name[0]}</div>

          </div>

            <div className="flex items-center gap-3">
              <span className="text-2xl">🌿</span>
              <h1 className="text-xl sm:text-2xl font-bold">Organica Body & SPA</h1>
            </div>
            <div className="flex items-center gap-2">

              <div className="avatar" style={{background: curUser.color, width:28, height:28, fontSize:12}}>{curUser.name[0]}</div>
              <button onClick={() => setCurrentUser("")} className="text-xs text-green-300 hover:text-white underline">trocar</button>
            </div>
          </div>
          <p className="text-green-200 text-sm">ACELERA E-COM ABRIL 2026</p>
          <div className="flex gap-3 mt-4 flex-wrap">
            <div className="bg-white bg-opacity-10 rounded-lg px-4 py-2 text-center">
              <div className="text-2xl font-bold">{pct}%</div>
              <div className="text-xs text-green-200">Progresso</div>
            </div>
            <div className="bg-white bg-opacity-10 rounded-lg px-4 py-2 text-center">
              <div className="text-2xl font-bold">{doneTasks}/{totalTasks}</div>
              <div className="text-xs text-green-200">Concluidas</div>
            </div>
            <div className="flex-1 min-w-0 bg-white bg-opacity-10 rounded-lg px-4 py-2">
              <div className="w-full bg-white bg-opacity-20 rounded-full h-4 mt-1">
                <div className="bg-green-400 h-4 rounded-full transition-all" style={{width: pct+"%"}} />
              </div>
              <div className="text-xs text-green-200 mt-1">{pct < 30 ? "Vamos acelerar!" : pct < 60 ? "Bom ritmo!" : pct < 90 ? "Quase la!" : "Tudo pronto!"}</div>
            </div>
          </div>
        </div>
      </div>

      {/* TABS */}
      <div className="max-w-5xl mx-auto px-3 mt-3">
        <div className="flex gap-1 bg-white rounded-lg p-1 shadow-sm overflow-x-auto">
          {[["checklist","Checklist"],["metrics","Metricas"],["calendar","Calendario"],["projection","Projecao"]].map(([k,l]) => (
            <button key={k} onClick={() => setActiveTab(k)}              className={"flex-1 py-2 px-2 rounded-md text-xs sm:text-sm font-medium transition-all whitespace-nowrap " +
                (activeTab===k ? "bg-green-600 text-white shadow" : "text-gray-600 hover:bg-gray-100")}>{l}</button>

      </div>

      <div className="max-w-5xl mx-auto px-3 py-4">

        {/* CHECKLIST */}
        {activeTab === "checklist" && (
          <div className="fade-in">
            <div className="flex gap-2 mb-4 flex-wrap">
              {[["all","Todas"],["pending","Pendentes"],["done","Concluidas"],["yuri","Yuri"],["joao","Joao"],["kaique","Kaique"],["octavio","Octavio"],["CRITICO","Criticas"]].map(([k,l]) => (

                  className={"px-3 py-1 rounded-full text-xs font-medium border transition-all " +
                    (filter===k ? "bg-green-600 text-white border-green-600" : "bg-white text-gray-600 border-gray-200 hover:border-green-300")}>{l}</button>

            </div>
            <div className="space-y-2">
              {filtered.map(t => {
                const doneBy = whoCompleted(t.id);
                return (
                <div key={t.id} className={"rounded-lg border transition-all " + (completed[t.id] ? "bg-green-50 border-green-200 opacity-70" : "bg-white border-gray-200 hover:border-green-300 hover:shadow-sm")}>

                      {completed[t.id] && <span className="text-xs">&#10003;</span>}

                    <div className="flex-1 min-w-0">

                      </div>

                        <span className="text-xs text-gray-500">{t.date}</span>

                          <span className="flex gap-0.5 items-center">
                            {doneBy.map(uid => {
                              const a = userAvatar(uid);
                              return <span key={uid} className="avatar" style={{background:a.color, width:18, height:18, fontSize:8}} title={uid}>{a.letter}</span>;
                            })}
                            <span className="text-xs text-green-600 ml-1">marcou</span>
                          </span>
                        )}
                      </div>
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                      <span className={"text-xs px-2 py-1 rounded-full border font-medium " + priorityColor(t.priority)}>{t.priority}</span>
                      <button onClick={(e) => { e.stopPropagation(); setExpandedTask(expandedTask === t.id ? null : t.id); }}
                        className="text-gray-400 hover:text-green-600 text-sm">i</button>
                    </div>
                  </div>
                  {expandedTask === t.id && (
                    <div className="px-3 pb-3 pt-0 border-t border-gray-100 bg-blue-50 rounded-b-lg fade-in">
                      <div className="text-xs text-blue-800 mt-2">
                        <strong>Segmentacao / Canal:</strong> {t.seg}
                      </div>
                    </div>
                  )}
                </div>              )})}
            </div>
          </div>
        )}

        {/* METRICS */}
        {activeTab === "metrics" && (
          <div className="fade-in space-y-4">
            <div className="bg-white rounded-xl p-4 shadow-sm">
              <h3 className="font-bold text-gray-800 mb-1">Metricas Diarias do Piloto</h3>
              <p className="text-xs text-gray-500 mb-4">Dados sincronizados em tempo real via Google Sheets. Metricas Yampi atualizadas automaticamente.</p>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                {Object.entries(METRICS_BASELINE).map(([key, m]) => {
                  const st = getStatus(key);
                  return (
                    <div key={key} className={"p-3 rounded-lg border-2 " + (st==="positive" ? "border-green-300 bg-green-50" : st==="negative" ? "border-red-300 bg-red-50" : "border-gray-200 bg-gray-50")}>
                      <div className="flex justify-between items-center mb-1">
                        <span className="text-sm font-medium text-gray-700">{m.label}</span>
                        <span className={"text-xs font-bold " + (st==="positive" ? "text-green-600" : st==="negative" ? "text-red-600" : "text-gray-400")}>
                          {st==="positive" ? "GO" : st==="negative" ? "ATENCAO" : "—"}
                        </span>
                      </div>
                      <div className="flex items-center gap-2">
                        <input type="number" step="0.01" placeholder={"Base: "+m.baseline}
                          value={metrics[key] || ""} onChange={e => updateMetric(key, e.target.value)}
                          className="border rounded px-2 py-1 text-sm w-24 focus:border-green-400 focus:ring-1 focus:ring-green-200 outline-none" />
                        <span className="text-xs text-gray-500">{m.unit} | Base: {m.baseline} | Meta: {m.inverse?"<= ":">= "}{m.target}</span>
                      </div>
                    </div>
                  );                })}
              </div>
            </div>

            <div className="bg-gradient-to-r from-gray-900 to-green-900 rounded-xl p-6 text-white">
              <h3 className="font-bold text-lg mb-3">Indicador Go / No-Go</h3>
              {(() => {
                const { pos, total } = goNoGo();
                const filled = Object.keys(metrics).filter(k => metrics[k] > 0).length;
                const pctGo = filled > 0 ? Math.round((pos / total) * 100) : 0;
                return (
                  <div>
                    <div className="flex items-center gap-4 mb-3">
                      <div className={"text-4xl font-bold " + (pctGo >= 67 ? "text-green-400" : pctGo >= 33 ? "text-yellow-400" : filled === 0 ? "text-gray-500" : "text-red-400")}>
                        {filled === 0 ? "—" : pctGo+"%"}
                      </div>
                      <div>
                        <div className="text-sm text-green-200">{pos}/{total} metricas no alvo</div>
                        <div className="text-sm">{pctGo >= 67 ? "GO — MANTER ACELERACAO" : pctGo >= 33 ? "AJUSTAR parametros" : filled===0 ? "Preencha as metricas acima" : "NO-GO — Considerar encerrar"}</div>
                      </div>
                    </div>
                    <div className="w-full bg-white bg-opacity-20 rounded-full h-4">
                      <div className={"h-4 rounded-full transition-all " + (pctGo>=67?"bg-green-400":pctGo>=33?"bg-yellow-400":"bg-red-400")} style={{width:pctGo+"%"}} />
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>
        )}
        {/* CALENDAR */}
        {activeTab === "calendar" && (
          <div className="fade-in space-y-4">
            <div className="bg-white rounded-xl p-4 shadow-sm">
              <h3 className="font-bold text-gray-800 mb-4">Cronograma 01-15 Abril</h3>
              <div className="space-y-2">
                {CALENDAR_EVENTS.map((ev,i) => (
                  <div key={i} className="flex items-center gap-3">
                    <div className="w-14 text-right"><div className="text-sm font-bold text-gray-700">{ev.date}</div></div>
                    <div className={"w-3 h-3 rounded-full flex-shrink-0 " + evColor(ev.type)} />
                    <div className={"flex-1 py-2 px-3 rounded-lg text-sm " +
                      (ev.type==="critical" ? "bg-red-100 text-red-800 font-bold border border-red-300" :
                       ev.type==="flash" ? "bg-red-50 text-red-700 border border-red-200" :
                       ev.type==="check" ? "bg-indigo-50 text-indigo-700 border border-indigo-200" :
                       ev.type==="launch" ? "bg-green-50 text-green-700 border border-green-200" :
                       "bg-gray-50 text-gray-700 border border-gray-200")}>{ev.label}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="bg-white rounded-xl p-4 shadow-sm">
              <h3 className="font-bold text-gray-800 mb-3">Cupons Configurados</h3>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                {CUPONS.map((c,i) => (
                  <div key={i} className="bg-yellow-50 border border-yellow-200 rounded-lg p-3">
                    <div className="flex justify-between items-start">
                      <div className="font-mono font-bold text-yellow-800 text-sm">{c.code}</div>
                      <span className="text-xs text-gray-400">{c.dates}</span>                    </div>
                    <div className="text-xs text-gray-600 mt-1">{c.desc}</div>
                    <div className="text-xs text-blue-600 mt-1">{c.seg}</div>
                  </div>
                ))}
              </div>
            </div>

          </div>
        )}

        {/* PROJECTION */}
        {activeTab === "projection" && (
          <div className="fade-in space-y-4">
            <div className="bg-white rounded-xl p-4 shadow-sm">
              <h3 className="font-bold text-gray-800 mb-3">P&L Mensal — ACELERA E-COM ABRIL</h3>
              {[
                { label: "(+) Receita reajuste Pomada 270 x R$5", value: "+R$ 1.350", color: "text-green-600" },
                { label: "(+) Receita reajuste Serum 210 x R$5", value: "+R$ 1.050", color: "text-green-600" },
                { label: "(+) Recuperacao carrinhos (10% conservador)", value: "+R$ 4.800", color: "text-green-600" },
                { label: "(-) Custo subsidio frete (~492 pedidos x R$10)", value: "-R$ 4.969", color: "text-red-600" },
                { label: "(-) Risco ticket minimo (worst case)", value: "-R$ 61", color: "text-red-400" },
              ].map((item,i) => (
                <div key={i} className="flex justify-between items-center py-2 px-3 bg-gray-50 rounded-lg mb-1">
                  <span className="text-sm text-gray-700">{item.label}</span>
                  <span className={"font-mono font-bold " + item.color}>{item.value}</span>
                </div>
              ))}
              <div className="flex justify-between items-center py-3 px-4 bg-green-800 text-white rounded-lg mt-2">
                <span className="font-bold">RESULTADO LIQUIDO MENSAL</span>                <span className="font-mono font-bold text-xl text-green-300">+R$ 2.170</span>
              </div>
            </div>

            <div className="bg-white rounded-xl p-4 shadow-sm">
              <h3 className="font-bold text-gray-800 mb-3">Projecao Receita Abril</h3>
              <div className="flex items-center py-1 px-3 mb-2 text-xs text-gray-400">
                <span className="flex-1"></span><span className="w-20 text-right">Conserv.</span><span className="w-20 text-right font-bold">Provavel</span><span className="w-20 text-right">Otimista</span>
              </div>
              {[
                { label: "Base organica (ritmo atual)", min: "R$65K", mid: "R$69K", max: "R$72K" },
                { label: "Order Bumps & Upsells", min: "+R$3K", mid: "+R$5K", max: "+R$7K" },
                { label: "Automacoes corrigidas", min: "+R$3K", mid: "+R$5K", max: "+R$8K" },
                { label: "Reajuste Pomada + Serum", min: "+R$2K", mid: "+R$2.4K", max: "+R$2.4K" },
                { label: "Frete Fixo + Frete Gratis", min: "+R$4K", mid: "+R$7K", max: "+R$10K" },
                { label: "Flash Sales (4.4, Pascoa, Mid)", min: "+R$3K", mid: "+R$5K", max: "+R$8K" },
                { label: "Reativacao RFM", min: "+R$1K", mid: "+R$2K", max: "+R$3.5K" },
              ].map((r,i) => (
                <div key={i} className="flex items-center py-2 border-b border-gray-100">
                  <span className="flex-1 text-sm text-gray-700">{r.label}</span>
                  <span className="w-20 text-right text-xs text-gray-500">{r.min}</span>
                  <span className="w-20 text-right text-sm font-medium text-blue-700">{r.mid}</span>
                  <span className="w-20 text-right text-xs text-green-600">{r.max}</span>
                </div>
              ))}
              <div className="flex items-center py-3 bg-green-50 rounded-lg mt-2 px-3">
                <span className="flex-1 font-bold text-gray-800">TOTAL ABRIL</span>
                <span className="w-20 text-right text-sm text-gray-600">R$81K</span>
                <span className="w-20 text-right font-bold text-blue-700">R$95.4K</span>
                <span className="w-20 text-right font-bold text-green-600">R$110.9K</span>              </div>
            </div>

            <div className="bg-white rounded-xl p-4 shadow-sm">
              <h3 className="font-bold text-gray-800 mb-3">Equipe</h3>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                {[
                  { name: "Octavio", role: "Gestor / Decisor", tasks: "Analise metricas, checkpoints, Go/No-Go" },
                  { name: "Yuri", role: "Operacional + Estaticos", tasks: "Config Yampi, templates email/WPP, disparos, banners" },
                  { name: "Joao", role: "Video / Reels", tasks: "Videos Reels/Stories, Dia da Mentira, countdowns" },
                  { name: "Kaique Sepalla", role: "Trafego / Meta Ads", tasks: "Criativos Meta Ads, budget, remarketing, lookalike" },

          </div>
        )}
      </div>

      <div className="text-center py-6 text-xs text-gray-400">
        Organica Body & SPA — ACELERA E-COM ABRIL 2026 | Dashboard v3 (compartilhado)<br/>
        Dados sincronizados via Google Sheets | Auto-refresh 30s
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
